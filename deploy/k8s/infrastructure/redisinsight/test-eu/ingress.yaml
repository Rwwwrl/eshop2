apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redisinsight-ingress
  annotations:
    # Basic auth
    nginx.org/basic-auth-secret: "redisinsight-basic-auth"
    nginx.org/basic-auth-realm: "RedisInsight"
    # Timeout configuration (read/send high for WebSocket + slow Redis commands)
    nginx.org/proxy-connect-timeout: "10s"
    nginx.org/proxy-send-timeout: "120s"
    nginx.org/proxy-read-timeout: "120s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - redisinsight-test.eshop-test.com
      secretName: eshop-test-wildcard-tls
  rules:
    - host: redisinsight-test.eshop-test.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redisinsight
                port:
                  number: 80
