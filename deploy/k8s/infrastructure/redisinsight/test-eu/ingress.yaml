apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redisinsight-ingress
  annotations:
    # Basic auth
    nginx.org/basic-auth-secret: "redisinsight-basic-auth"
    nginx.org/basic-auth-realm: "RedisInsight"
    # Rate limiting (10r/s per IP, burst 20) — admin-only tool
    nginx.org/limit-req-rate: "10r/s"
    nginx.org/limit-req-key: "${binary_remote_addr}"
    nginx.org/limit-req-zone-size: "5M"
    nginx.org/limit-req-burst: "20"
    nginx.org/limit-req-no-delay: "true"
    nginx.org/limit-req-reject-code: "429"
    nginx.org/limit-req-log-level: "warn"
    # Timeout configuration
    nginx.org/proxy-connect-timeout: "10s"
    nginx.org/proxy-send-timeout: "20s"
    nginx.org/proxy-read-timeout: "20s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - redisinsight-test.eshop-test.com
      secretName: eshop-test-wildcard-tls
  rules:
    - host: redisinsight-test.eshop-test.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redisinsight
                port:
                  number: 80
