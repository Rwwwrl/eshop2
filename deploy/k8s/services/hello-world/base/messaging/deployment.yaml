apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-messaging
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hello-world-messaging
  template:
    metadata:
      labels:
        app: hello-world-messaging
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: default-pool
      containers:
        - name: hello-world-messaging
          command: ["poetry", "run", "faststream", "run", "hello_world.messaging.main:app"]
          env:
            - name: FASTSTREAM_CLI_RICH_MODE
              value: "none"
          envFrom:
            - configMapRef:
                name: hello-world-config
            - secretRef:
                name: hello-world-secrets
