apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-http
spec:
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: hello-world-http
  template:
    metadata:
      labels:
        app: hello-world-http
    spec:
      terminationGracePeriodSeconds: 95
      nodeSelector:
        cloud.google.com/gke-nodepool: default-pool
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hello-world-http
                topologyKey: kubernetes.io/hostname
      containers:
        - name: hello-world
          command: ["poetry", "run", "uvicorn", "hello_world.http.main:app", "--host", "0.0.0.0", "--port", "8000", "--timeout-keep-alive", "75"]
          envFrom:
            - configMapRef:
                name: hello-world-config
            - secretRef:
                name: hello-world-secrets
          env:
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry-auth
                  key: SENTRY_DSN
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          # NOTE @sosov: Sleep gives NGINX Ingress time to deregister the pod endpoint
          # before Uvicorn receives SIGTERM. Without this, in-flight requests get dropped
          # because endpoint removal from the Service is async.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /readiness_check
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
