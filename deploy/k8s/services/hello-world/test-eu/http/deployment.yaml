apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-http
spec:
  replicas: 2
  strategy:
    type: Recreate
  template:
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: default-pool
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hello-world-http
                topologyKey: kubernetes.io/hostname
      containers:
        - name: hello-world
          image: hello-world
          imagePullPolicy: Always
