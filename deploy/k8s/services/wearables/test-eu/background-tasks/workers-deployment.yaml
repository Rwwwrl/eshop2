apiVersion: apps/v1
kind: Deployment
metadata:
  name: wearables-background-tasks
spec:
  template:
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: wearables-background-tasks
      containers:
        - name: wearables-background-tasks
          image: wearables
          imagePullPolicy: Always
