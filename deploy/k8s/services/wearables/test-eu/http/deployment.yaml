apiVersion: apps/v1
kind: Deployment
metadata:
  name: wearables-http
spec:
  template:
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
      containers:
        - name: wearables
          image: wearables
          imagePullPolicy: Always
