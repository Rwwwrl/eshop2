apiVersion: apps/v1
kind: Deployment
metadata:
  name: wearables-http
spec:
  replicas: 2
  strategy:
    type: Recreate
  template:
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: wearables-pool
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: wearables-http
      containers:
        - name: wearables
          image: wearables
          imagePullPolicy: Always
