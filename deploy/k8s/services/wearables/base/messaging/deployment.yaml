apiVersion: apps/v1
kind: Deployment
metadata:
  name: wearables-messaging
spec:
  selector:
    matchLabels:
      app: wearables-messaging
  template:
    metadata:
      labels:
        app: wearables-messaging
    spec:
      terminationGracePeriodSeconds: 80
      containers:
        - name: wearables-messaging
          command: ["poetry", "run", "taskiq", "worker", "--workers", "1", "--max-async-tasks", "4", "--wait-tasks-timeout", "65", "--shutdown-timeout", "10", "wearables.messaging.main:broker", "wearables.messaging.handlers"]
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  test -f /tmp/taskiq_heartbeat &&
                  written_at=$(cat /tmp/taskiq_heartbeat) &&
                  now=$(date +%s) &&
                  age=$((now - ${written_at%%.*})) &&
                  test "$age" -lt 60
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          # NOTE @sosov: memory budget: ~130Mi idle (main + 1 worker) + 75Mi per async task.
          # requests = 130 idle + 75 × 1 task = 205Mi (guaranteed minimum).
          # limits = 130 idle + 75 × 4 tasks (--max-async-tasks) = 430Mi (worst case).
          resources:
            requests:
              cpu: "50m"
              memory: "205Mi"
            limits:
              cpu: "200m"
              memory: "430Mi"
