apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  annotations:
    # Rate limiting (15r/s per IP, burst 30)
    nginx.org/limit-req-rate: "15r/s"
    nginx.org/limit-req-key: "${binary_remote_addr}"
    nginx.org/limit-req-zone-size: "10M"
    nginx.org/limit-req-scale: "true"
    nginx.org/limit-req-burst: "30"
    nginx.org/limit-req-no-delay: "true"
    nginx.org/limit-req-reject-code: "429"
    # Timeout configuration
    nginx.org/proxy-connect-timeout: "10s"
    nginx.org/proxy-send-timeout: "60s"
    nginx.org/proxy-read-timeout: "60s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - test.eshop-test.com
      secretName: eshop-test-wildcard-tls
  rules:
    - host: test.eshop-test.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
