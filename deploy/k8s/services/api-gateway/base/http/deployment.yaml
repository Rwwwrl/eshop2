apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-http
spec:
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: api-gateway-http
  template:
    metadata:
      labels:
        app: api-gateway-http
    spec:
      terminationGracePeriodSeconds: 95
      nodeSelector:
        cloud.google.com/gke-nodepool: default-pool
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: api-gateway-http
              topologyKey: kubernetes.io/hostname
      containers:
        - name: api-gateway
          command: ["poetry", "run", "uvicorn", "api_gateway.http.main:app", "--host", "0.0.0.0", "--port", "8000", "--timeout-keep-alive", "75"]
          envFrom:
            - configMapRef:
                name: api-gateway-config
            - secretRef:
                name: api-gateway-secrets
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          # NOTE @sosov: Sleep gives NGINX Ingress time to deregister the pod endpoint
          # before Uvicorn receives SIGTERM. Without this, in-flight requests get dropped
          # because endpoint removal from the Service is async.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /readiness_check
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
