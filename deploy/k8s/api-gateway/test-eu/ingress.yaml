apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    # Rate limiting (effective ~15r/s with 3 replicas)
    nginx.org/limit-req-rate: "5r/s"
    nginx.org/limit-req-key: "${binary_remote_addr}"
    nginx.org/limit-req-zone-size: "1M"
    nginx.org/limit-req-burst: "20"
    nginx.org/limit-req-no-delay: "true"
    nginx.org/limit-req-reject-code: "429"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - test.eshop-test.com
      secretName: api-gateway-tls
  rules:
    - host: test.eshop-test.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
