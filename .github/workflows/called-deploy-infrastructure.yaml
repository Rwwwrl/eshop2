name: Deploy Infrastructure to GKE

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy-ingress-nginx:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add NGINX Helm repo
        run: |
          helm repo add nginx-stable https://helm.nginx.com/stable
          helm repo update

      - name: Deploy NGINX Ingress Controller
        run: |
          helm upgrade nginx-ingress nginx-stable/nginx-ingress \
            --install \
            --namespace ingress-nginx \
            --create-namespace \
            -f deploy/k8s/infrastructure/ingress-nginx/${{ inputs.environment }}/values.yaml

      - name: Deploy cert-manager ClusterIssuer
        run: |
          kubectl apply -f deploy/k8s/infrastructure/cert-manager/cluster-issuer.yaml
