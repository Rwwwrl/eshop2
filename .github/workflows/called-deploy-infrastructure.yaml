name: Deploy Infrastructure to GKE

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy-ingress-nginx:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add NGINX Helm repo
        run: |
          helm repo add nginx-stable https://helm.nginx.com/stable
          helm repo update

      - name: Deploy NGINX Ingress Controller
        run: |
          helm upgrade nginx-ingress nginx-stable/nginx-ingress \
            --install \
            --namespace ingress-nginx \
            --create-namespace \
            -f deploy/k8s/infrastructure/ingress-nginx/${{ inputs.environment }}/values.yaml

      - name: Deploy cert-manager ClusterIssuer
        run: |
          kubectl apply -f deploy/k8s/infrastructure/cert-manager/cluster-issuer.yaml

  deploy-pgcat:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Apply PgCat secret
        run: >-
          gsutil -q cp
          gs://${{ vars.GCS_CONFIG_BUCKET }}/infrastructure/pgcat/pgcat-secret.yaml -
          | kubectl apply -f -

      - name: Deploy PgCat
        run: |
          kustomize build deploy/k8s/infrastructure/pgcat/${{ inputs.environment }} \
            | kubectl apply -f -

      # TODO @sosov: Restarts pods every deploy even if secret didn't change. PgCat reads pgcat.toml
      # only at startup, so a restart is needed to pick up secret changes. Consider config hash
      # annotation to restart only when the secret actually changes.
      - name: Restart PgCat pods to pick up secret changes
        run: kubectl rollout restart deployment/pgcat

      - name: Wait for rollout
        run: kubectl rollout status deployment/pgcat --timeout=120s
