name: Deploy Infrastructure to GKE

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy-pgbouncer:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Deploy PgBouncer
        run: |
          kustomize build deploy/k8s/infrastructure/pgbouncer/${{ inputs.environment }} \
            | kubectl apply -f -

      # TODO @sosov: Restarts pods every deploy even if secret didn't change. PgBouncer reads pgbouncer.ini
      # only at startup, so a restart is needed to pick up secret changes. Consider config hash
      # annotation to restart only when the secret actually changes.
      - name: Restart PgBouncer pods to pick up secret changes
        run: kubectl rollout restart deployment/pgbouncer

      - name: Wait for rollout
        run: kubectl rollout status deployment/pgbouncer --timeout=120s

  deploy-keda:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Deploy KEDA TriggerAuthentication
        run: kubectl apply -f deploy/k8s/infrastructure/keda/trigger-auth.yaml
