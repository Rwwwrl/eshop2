name: Deploy Infrastructure to GKE

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  apply-secrets:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Apply secrets
        run: |
          for secret in $(gsutil ls gs://${{ vars.GCS_CONFIG_BUCKET }}/infrastructure/secrets/*.yaml); do
            gsutil -q cp "$secret" - | kubectl apply -f -
          done

  deploy-ingress-nginx:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add NGINX Helm repo
        run: |
          helm repo add nginx-stable https://helm.nginx.com/stable
          helm repo update

      - name: Deploy NGINX Ingress Controller
        run: |
          helm upgrade nginx-ingress nginx-stable/nginx-ingress \
            --install \
            --namespace ingress-nginx \
            --create-namespace \
            -f deploy/k8s/infrastructure/ingress-nginx/${{ inputs.environment }}/values.yaml

      - name: Deploy cert-manager ClusterIssuer
        run: |
          kubectl apply -f deploy/k8s/infrastructure/cert-manager/cluster-issuer.yaml

  deploy-pgbouncer:
    needs: [apply-secrets]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Deploy PgBouncer
        run: |
          kustomize build deploy/k8s/infrastructure/pgbouncer/${{ inputs.environment }} \
            | kubectl apply -f -

      # TODO @sosov: Restarts pods every deploy even if secret didn't change. PgBouncer reads pgbouncer.ini
      # only at startup, so a restart is needed to pick up secret changes. Consider config hash
      # annotation to restart only when the secret actually changes.
      - name: Restart PgBouncer pods to pick up secret changes
        run: kubectl rollout restart deployment/pgbouncer

      - name: Wait for rollout
        run: kubectl rollout status deployment/pgbouncer --timeout=120s

  deploy-keda:
    needs: [apply-secrets]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy KEDA
        run: |
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm upgrade keda kedacore/keda \
            --install \
            --namespace keda \
            --create-namespace \
            --version 2.19.0

      - name: Deploy KEDA TriggerAuthentication
        run: kubectl apply -f deploy/k8s/infrastructure/keda/trigger-auth.yaml

  deploy-redis-exporter:
    needs: [apply-secrets]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Deploy redis-exporter
        run: |
          kustomize build deploy/k8s/infrastructure/redis-exporter/${{ inputs.environment }} \
            | kubectl apply -f -

      - name: Wait for rollout
        run: kubectl rollout status deployment/redis-exporter --timeout=120s
