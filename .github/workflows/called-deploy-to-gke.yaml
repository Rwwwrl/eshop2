name: Deploy Service to GKE

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      run_alembic_migrations:
        required: false
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Get version
        id: version
        run: |
          service_version=$(grep '^version = ' ${{ inputs.service_path }}/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "service_version=${service_version}" >> $GITHUB_OUTPUT

      - name: Download env config
        run: |
          gsutil cp \
            gs://${{ vars.GCS_CONFIG_BUCKET }}/services/${{ inputs.service_name }}/env.yaml \
            ${{ inputs.service_path }}/env.yaml

      - name: Build and push
        env:
          REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_NAME }}
        run: |
          IMAGE=${REGISTRY}/${{ inputs.service_name }}
          VERSION=${{ steps.version.outputs.service_version }}

          export GCP_TOKEN=$(gcloud auth print-access-token)
          echo "::add-mask::$GCP_TOKEN"

          docker build \
            --secret id=gcp_token,env=GCP_TOKEN \
            --build-arg REGISTRY_URL="https://${{ vars.GCP_REGION }}-python.pkg.dev/${{ vars.GCP_PROJECT_ID }}/myeshop-python/simple/" \
            -t ${IMAGE}:${VERSION} \
            ${{ inputs.service_path }}

          docker push ${IMAGE}:${VERSION}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Run expand migrations
        id: expand_migrations
        if: ${{ inputs.run_alembic_migrations }}
        env:
          REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_NAME }}
        run: |
          cd deploy/k8s/services/${{ inputs.service_name }}/${{ inputs.environment }}/postgres-migration/expand
          kustomize edit set image ${{ inputs.service_name }}=${REGISTRY}/${{ inputs.service_name }}:${{ steps.version.outputs.service_version }}
          kubectl delete job/${{ inputs.service_name }}-postgres-expand-migration --ignore-not-found
          kustomize build . | kubectl apply -f -
          kubectl wait --for=condition=complete job/${{ inputs.service_name }}-postgres-expand-migration --timeout=120s

      - name: Deploy with kustomize
        env:
          REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_NAME }}
        run: |
          cd deploy/k8s/services/${{ inputs.service_name }}/${{ inputs.environment }}

          kustomize edit set image ${{ inputs.service_name }}=${REGISTRY}/${{ inputs.service_name }}:${{ steps.version.outputs.service_version }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: kubectl rollout status deployment/${{ inputs.service_name }} --timeout=300s

      - name: Run contract migrations
        id: contract_migrations
        if: ${{ inputs.run_alembic_migrations }}
        env:
          REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_NAME }}
        run: |
          cd deploy/k8s/services/${{ inputs.service_name }}/${{ inputs.environment }}/postgres-migration/contract
          kustomize edit set image ${{ inputs.service_name }}=${REGISTRY}/${{ inputs.service_name }}:${{ steps.version.outputs.service_version }}
          kubectl delete job/${{ inputs.service_name }}-postgres-contract-migration --ignore-not-found
          kustomize build . | kubectl apply -f -
          kubectl wait --for=condition=complete job/${{ inputs.service_name }}-postgres-contract-migration --timeout=120s

      - name: Show expand migration logs on failure
        if: failure() && steps.expand_migrations.outcome == 'failure'
        run: kubectl logs job/${{ inputs.service_name }}-postgres-expand-migration 2>/dev/null || echo "No expand migration logs available"

      - name: Show contract migration logs on failure
        if: failure() && steps.contract_migrations.outcome == 'failure'
        run: kubectl logs job/${{ inputs.service_name }}-postgres-contract-migration 2>/dev/null || echo "No contract migration logs available"
