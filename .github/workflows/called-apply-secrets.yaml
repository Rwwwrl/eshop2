name: Apply Secrets to GKE

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Apply secrets
        run: |
          for secret in $(gsutil ls gs://${{ vars.GCS_CONFIG_BUCKET }}/infrastructure/secrets/*.yaml); do
            gsutil -q cp "$secret" - | kubectl apply -f -
          done

      - name: Force sync external secrets
        run: |
          kubectl annotate externalsecrets --all \
            force-sync=$(date +%s) --overwrite
          kubectl wait externalsecrets --all \
            --for=condition=Ready --timeout=60s
