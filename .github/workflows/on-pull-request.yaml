name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint_and_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: cicd
      POSTGRES_DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/wearables

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install

      - name: Run linter
        run: poetry run ruff check .

      - name: Check formatting
        run: poetry run ruff format --check .

      - name: Run tests
        run: poetry run pytest -c pytest.ini

  check_versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check versions for changed services
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed_services=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^src/services/' | cut -d/ -f3 | sort -u)

          if [ -z "$changed_services" ]; then
            echo "No service changes detected"
            exit 0
          fi

          for service_dir in $changed_services; do
            service_path="src/services/$service_dir"

            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^${service_path}/pyproject.toml$"; then
              echo "::error::${service_dir} code changed but pyproject.toml version was not updated"
              exit 1
            fi

            if ! BASE_TOML=$(git show origin/${{ github.base_ref }}:${service_path}/pyproject.toml 2>/dev/null); then
              echo "${service_dir}: new service, skipping version comparison"
              continue
            fi

            BASE_VERSION=$(echo "$BASE_TOML" | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
            HEAD_VERSION=$(grep '^version = ' ${service_path}/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

            if [[ "$HEAD_VERSION" == "$BASE_VERSION" ]]; then
              echo "::error::${service_dir}/pyproject.toml version was not bumped ($BASE_VERSION -> $HEAD_VERSION)"
              exit 1
            fi

            echo "${service_dir}: $BASE_VERSION -> $HEAD_VERSION"
          done

          # Check libs version
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^src/libs/'; then
            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^src/libs/pyproject.toml$'; then
              echo "::error::libs code changed but pyproject.toml version was not updated"
              exit 1
            fi

            if BASE_TOML=$(git show origin/${{ github.base_ref }}:src/libs/pyproject.toml 2>/dev/null); then
              BASE_VERSION=$(echo "$BASE_TOML" | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
              HEAD_VERSION=$(grep '^version = ' src/libs/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

              if [[ "$HEAD_VERSION" == "$BASE_VERSION" ]]; then
                echo "::error::libs/pyproject.toml version was not bumped ($BASE_VERSION -> $HEAD_VERSION)"
                exit 1
              fi

              echo "libs: $BASE_VERSION -> $HEAD_VERSION"
            else
              echo "libs: new package, skipping version comparison"
            fi
          else
            echo "No libs changes detected"
          fi

  validate_manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bmuschko/setup-kubeconform@v1

      - name: Validate manifests
        run: |
          for service_dir in deploy/k8s/services/*/; do
            for env_dir in "$service_dir"*/; do
              env=$(basename "$env_dir")
              [[ "$env" == "base" ]] && continue

              echo "Validating $service/$env..."
              kubectl kustomize "$env_dir" | kubeconform \
                -strict \
                -summary \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            done
          done
