name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install

      - name: Run linter
        run: poetry run ruff check .

      - name: Check formatting
        run: poetry run ruff format --check .

      - name: Run tests
        run: poetry run pytest

  check_versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check versions for changed services
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed_services=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^src/services/' | cut -d/ -f3 | sort -u)

          if [ -z "$changed_services" ]; then
            echo "No service changes detected"
            exit 0
          fi

          for service_dir in $changed_services; do
            service_path="src/services/$service_dir"

            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^${service_path}/VERSION$"; then
              echo "::error::${service_dir} code changed but VERSION was not updated"
              exit 1
            fi

            if ! BASE_VERSION=$(git show origin/${{ github.base_ref }}:${service_path}/VERSION 2>/dev/null); then
              echo "${service_dir}: new service, skipping version comparison"
              continue
            fi

            HEAD_VERSION=$(cat ${service_path}/VERSION)

            if [[ "$HEAD_VERSION" == "$BASE_VERSION" ]]; then
              echo "::error::${service_dir}/VERSION was not bumped ($BASE_VERSION -> $HEAD_VERSION)"
              exit 1
            fi

            echo "${service_dir}: $BASE_VERSION -> $HEAD_VERSION"
          done

  validate_manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bmuschko/setup-kubeconform@v1

      - name: Validate manifests
        run: |
          for service_dir in deploy/k8s/services/*/; do
            for env_dir in "$service_dir"*/; do
              env=$(basename "$env_dir")
              [[ "$env" == "base" ]] && continue

              echo "Validating $service/$env..."
              kubectl kustomize "$env_dir" | kubeconform \
                -strict \
                -summary \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            done
          done
