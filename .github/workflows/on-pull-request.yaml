name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  get_changes:
    runs-on: ubuntu-latest
    outputs:
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      hello_world: ${{ steps.filter.outputs.hello_world }}
      k8s_manifests: ${{ steps.filter.outputs.k8s_manifests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api_gateway:
              - 'src/services/api_gateway/**'
            hello_world:
              - 'src/services/hello_world/**'
            k8s_manifests:
              - 'deploy/k8s/**'

  on-api-gateway-pull-request:
    needs: get_changes
    if: needs.get_changes.outputs.api_gateway == 'true'
    uses: ./.github/workflows/called-service-on-pull-request.yaml
    with:
      service_name: api-gateway
      service_path: src/services/api_gateway

  on-hello-world-pull-request:
    needs: get_changes
    if: needs.get_changes.outputs.hello_world == 'true'
    uses: ./.github/workflows/called-service-on-pull-request.yaml
    with:
      service_name: hello-world
      service_path: src/services/hello_world

  validate_manifests:
    needs: get_changes
    if: needs.get_changes.outputs.k8s_manifests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, test-eu]
        service: [api-gateway, hello-world]
    steps:
      - uses: actions/checkout@v4

      - uses: bmuschko/setup-kubeconform@v1

      - name: Validate ${{ matrix.environment }}/${{ matrix.service }} manifests
        run: |
          echo "Validating ${{ matrix.environment }}/${{ matrix.service }}..."
          kubectl kustomize deploy/k8s/${{ matrix.service }}/${{ matrix.environment }} | kubeconform -strict -summary

  # NOTE @sosov: Conditional jobs (filtered by paths-filter) cannot be used as required
  # status checks directly. If a job is skipped, GitHub treats it as "pending forever".
  # This gate job always runs and aggregates results, allowing us to use a single
  # required status check that works regardless of which services were modified.
  pr-ready-to-merge:
    name: PR Ready to Merge
    runs-on: ubuntu-latest
    needs: [on-api-gateway-pull-request, on-hello-world-pull-request, validate_manifests]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          results=(
            "${{ needs.on-api-gateway-pull-request.result }}"
            "${{ needs.on-hello-world-pull-request.result }}"
            "${{ needs.validate_manifests.result }}"
          )

          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "One or more checks failed"
              exit 1
            fi
          done

          echo "All checks passed or were skipped (not needed)"
