name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint_and_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install

      - name: Run linter
        run: poetry run ruff check .

      - name: Check formatting
        run: poetry run ruff format --check .

      - name: Check import boundaries
        run: poetry run lint-imports

      - name: Run tests
        run: poetry run pytest --cov --cov-fail-under=90

  check_versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check versions for changed services
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed_services=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^src/services/' | cut -d/ -f3 | sort -u)

          if [ -z "$changed_services" ]; then
            echo "No service changes detected"
            exit 0
          fi

          for service_dir in $changed_services; do
            service_path="src/services/$service_dir"

            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^${service_path}/pyproject.toml$"; then
              echo "::error::${service_dir} code changed but pyproject.toml version was not updated"
              exit 1
            fi

            if ! BASE_TOML=$(git show origin/${{ github.base_ref }}:${service_path}/pyproject.toml 2>/dev/null); then
              echo "${service_dir}: new service, skipping version comparison"
              continue
            fi

            BASE_VERSION=$(echo "$BASE_TOML" | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
            HEAD_VERSION=$(grep '^version = ' ${service_path}/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

            if [[ "$HEAD_VERSION" == "$BASE_VERSION" ]]; then
              echo "::error::${service_dir}/pyproject.toml version was not bumped ($BASE_VERSION -> $HEAD_VERSION)"
              exit 1
            fi

            echo "${service_dir}: $BASE_VERSION -> $HEAD_VERSION"
          done

          # Check shared package versions
          shared_packages="libs messaging_contracts"
          for pkg in $shared_packages; do
            if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^src/${pkg}/"; then
              if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^src/${pkg}/pyproject.toml$"; then
                echo "::error::${pkg} code changed but pyproject.toml version was not updated"
                exit 1
              fi

              if BASE_TOML=$(git show origin/${{ github.base_ref }}:src/${pkg}/pyproject.toml 2>/dev/null); then
                BASE_VERSION=$(echo "$BASE_TOML" | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
                HEAD_VERSION=$(grep '^version = ' src/${pkg}/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

                if [[ "$HEAD_VERSION" == "$BASE_VERSION" ]]; then
                  echo "::error::${pkg}/pyproject.toml version was not bumped ($BASE_VERSION -> $HEAD_VERSION)"
                  exit 1
                fi

                echo "${pkg}: $BASE_VERSION -> $HEAD_VERSION"
              else
                echo "${pkg}: new package, skipping version comparison"
              fi
            else
              echo "No ${pkg} changes detected"
            fi
          done

  validate_manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bmuschko/setup-kubeconform@v1

      - name: Validate manifests
        run: |
          for kustomization in $(find deploy/k8s -name kustomization.yaml -not -path "*/base/*"); do
            dir=$(dirname "$kustomization")
            echo "Validating $dir..."
            kubectl kustomize "$dir" | kubeconform \
              -strict \
              -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          done
