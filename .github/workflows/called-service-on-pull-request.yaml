name: Service PR Validation

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string

jobs:
  check_version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if pyproject.toml was updated
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^${{ inputs.service_path }}/pyproject.toml$"; then
            echo "PYPROJECT_CHANGED=true" >> $GITHUB_ENV
          else
            echo "::error::${{ inputs.service_name }} code changed but pyproject.toml was not updated"
            exit 1
          fi

      - name: Get version from base branch
        run: |
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:${{ inputs.service_path }}/pyproject.toml | grep '^version = ' | sed -E 's/version = "(.*)"/\1/')
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_ENV

      - name: Get version from PR branch
        run: |
          HEAD_VERSION=$(grep '^version = ' ${{ inputs.service_path }}/pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "HEAD_VERSION=$HEAD_VERSION" >> $GITHUB_ENV

      - name: Compare versions
        run: |
          echo "Base version: $BASE_VERSION"
          echo "PR version: $HEAD_VERSION"
          if [[ "$HEAD_VERSION" == "$BASE_VERSION" ]]; then
            echo "::error::Version in ${{ inputs.service_name }}/pyproject.toml was not bumped!"
            exit 1
          fi
          echo "Version bumped: $BASE_VERSION -> $HEAD_VERSION"

  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          target: ci
          load: true
          tags: ${{ inputs.service_name }}:ci
          cache-from: type=gha,scope=${{ inputs.service_name }}-ci
          cache-to: type=gha,mode=max,scope=${{ inputs.service_name }}-ci

      - name: Run linter
        run: docker run --rm ${{ inputs.service_name }}:ci poetry run ruff check .

      - name: Check formatting
        run: docker run --rm ${{ inputs.service_name }}:ci poetry run ruff format --check .

      - name: Run tests
        run: docker run --rm ${{ inputs.service_name }}:ci poetry run pytest -c pytest.ini
